<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="page.css">
  <title>Page</title>
</head>
<body>
  <div class="page-toolbar">
    <div class="page-toolbar-left">
      <svg class="page-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M4.5 1.5h5l3.5 3.5v8.5a1.5 1.5 0 01-1.5 1.5h-7A1.5 1.5 0 013 13.5V3a1.5 1.5 0 011.5-1.5z" stroke="#6366f1" stroke-width="1.3" stroke-linejoin="round" fill="none"/>
        <path d="M9.5 1.5V5.5h4" stroke="#6366f1" stroke-width="1.3" stroke-linejoin="round"/>
      </svg>
      <span class="page-task-title" id="page-task-title">Notes</span>
    </div>
    <div class="page-view-toggle" id="page-view-toggle">
      <button class="view-btn active" data-view="notes">Notes</button>
      <button class="view-btn" data-view="timeline">Timeline</button>
    </div>
  </div>
  <div class="page-editor-wrap">
    <textarea class="page-editor" id="page-editor" placeholder="Write your notes here..." spellcheck="true"></textarea>
    <div class="timeline-container" id="timeline-container" style="display:none"></div>
  </div>
  <div class="page-status" id="page-status"></div>

  <script>
  (function () {
    'use strict';

    const { invoke } = window.__TAURI__.core;
    const { getCurrentWindow } = window.__TAURI__.window;

    const win = getCurrentWindow();
    const taskId = win.label.substring(5); // strip "page_"
    const isDaily = taskId.startsWith('daily_');

    const titleEl = document.getElementById('page-task-title');
    const editor = document.getElementById('page-editor');
    const statusEl = document.getElementById('page-status');
    const timelineContainer = document.getElementById('timeline-container');
    const viewToggle = document.getElementById('page-view-toggle');

    let saveTimer = null;
    let timelinePollInterval = null;
    let currentView = 'notes';

    // ── Helpers ──

    function formatTimeShort(ms) {
      const d = new Date(ms);
      let h = d.getHours();
      const m = d.getMinutes();
      const ampm = h >= 12 ? 'p' : 'a';
      h = h % 12 || 12;
      return m === 0 ? `${h}${ampm}` : `${h}:${String(m).padStart(2, '0')}${ampm}`;
    }

    function formatDuration(ms) {
      const totalMin = Math.floor(ms / 60000);
      if (totalMin < 60) return `${totalMin}m`;
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;
      return m > 0 ? `${h}h ${m}m` : `${h}h`;
    }

    function formatDayLabel(ms) {
      const d = new Date(ms);
      return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    }

    // ── Load content ──

    async function loadContent() {
      try {
        const content = await invoke('load_page', { taskId });
        editor.value = content;

        if (isDaily) {
          const dateStr = taskId.substring(6);
          const d = new Date(dateStr + 'T00:00:00');
          const title = d.toLocaleDateString('en-US', {
            weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
          });
          titleEl.textContent = title;
          document.title = `Notes — ${title}`;
        } else {
          const data = await invoke('load_data');
          const allTasks = [...(data.todos || []), ...(data.archivedTodos || [])];
          const task = allTasks.find(t => t.id === taskId);
          if (task) {
            titleEl.textContent = task.title;
            document.title = task.title;
          }
        }
      } catch (e) {
        console.error('Failed to load page:', e);
      }
      editor.focus();
    }

    // ── Auto-save with debounce ──

    function scheduleSave() {
      clearTimeout(saveTimer);
      statusEl.textContent = '';
      saveTimer = setTimeout(async () => {
        try {
          await invoke('save_page', { taskId, content: editor.value });
          statusEl.textContent = 'Saved';
          setTimeout(() => { statusEl.textContent = ''; }, 1500);
        } catch (e) {
          console.error('Failed to save page:', e);
        }
      }, 400);
    }

    editor.addEventListener('input', scheduleSave);

    window.addEventListener('beforeunload', () => {
      clearTimeout(saveTimer);
      invoke('save_page', { taskId, content: editor.value });
    });

    editor.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
        editor.selectionStart = editor.selectionEnd = start + 2;
        scheduleSave();
      }
    });

    // ── View toggle ──

    viewToggle.addEventListener('click', (e) => {
      const btn = e.target.closest('.view-btn');
      if (!btn || btn.dataset.view === currentView) return;

      currentView = btn.dataset.view;
      viewToggle.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      if (currentView === 'timeline') {
        editor.style.display = 'none';
        timelineContainer.style.display = '';
        loadTimeline();
      } else {
        editor.style.display = '';
        timelineContainer.style.display = 'none';
        stopTimelinePoll();
      }
    });

    // ── Timeline ──

    async function loadTimeline() {
      try {
        const bouts = await invoke('load_timeline', { taskId });
        if (isDaily) {
          renderDailyTimeline(bouts);
        } else {
          renderTaskTimeline(bouts);
        }

        // Poll if there's an active bout
        stopTimelinePoll();
        if (bouts.some(b => b.endMs === null)) {
          timelinePollInterval = setInterval(loadTimeline, 10000);
        }
      } catch (e) {
        console.error('Failed to load timeline:', e);
        timelineContainer.innerHTML = '<div class="timeline-empty">Failed to load timeline</div>';
      }
    }

    function stopTimelinePoll() {
      if (timelinePollInterval) {
        clearInterval(timelinePollInterval);
        timelinePollInterval = null;
      }
    }

    window.addEventListener('beforeunload', stopTimelinePoll);

    // ── Task Timeline: day-grouped horizontal blocks ──

    function renderTaskTimeline(bouts) {
      if (!bouts.length) {
        timelineContainer.innerHTML = '<div class="timeline-empty"><p>No sessions recorded</p></div>';
        return;
      }

      // Group bouts by day
      const dayGroups = new Map();
      for (const bout of bouts) {
        const dayKey = new Date(bout.startMs).toLocaleDateString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit' });
        if (!dayGroups.has(dayKey)) dayGroups.set(dayKey, []);
        dayGroups.get(dayKey).push(bout);
      }

      let totalMs = 0;
      let html = '<div class="timeline-task-view">';

      for (const [dayKey, dayBouts] of dayGroups) {
        const dayLabel = formatDayLabel(dayBouts[0].startMs);

        // Compute axis range for this day
        const starts = dayBouts.map(b => b.startMs);
        const ends = dayBouts.map(b => b.endMs || Date.now());
        const minMs = Math.min(...starts);
        const maxMs = Math.max(...ends);

        // Round to hour boundaries
        const minDate = new Date(minMs);
        minDate.setMinutes(0, 0, 0);
        const axisStart = minDate.getTime();

        const maxDate = new Date(maxMs);
        maxDate.setMinutes(0, 0, 0);
        maxDate.setHours(maxDate.getHours() + 1);
        const axisEnd = maxDate.getTime();

        const axisSpan = axisEnd - axisStart;

        // Hour ticks
        let ticksHtml = '';
        const tickDate = new Date(axisStart);
        while (tickDate.getTime() <= axisEnd) {
          const pct = ((tickDate.getTime() - axisStart) / axisSpan) * 100;
          const label = formatTimeShort(tickDate.getTime());
          ticksHtml += `<div class="timeline-hour-tick" style="left:${pct}%"><span>${label}</span></div>`;
          tickDate.setHours(tickDate.getHours() + 1);
        }

        // Bout blocks
        let blocksHtml = '';
        let belowLabels = '';
        for (const bout of dayBouts) {
          const endMs = bout.endMs || Date.now();
          const durationMs = endMs - bout.startMs;
          totalMs += durationMs;

          const leftPct = ((bout.startMs - axisStart) / axisSpan) * 100;
          const widthPct = Math.max((durationMs / axisSpan) * 100, 2); // min 2%
          const activeClass = bout.endMs === null ? ' active' : '';
          const timeRange = `${formatTimeShort(bout.startMs)}–${bout.endMs === null ? 'now' : formatTimeShort(bout.endMs)}`;
          const label = `${timeRange} · ${formatDuration(durationMs)}`;

          blocksHtml += `<div class="timeline-hblock${activeClass}" style="left:${leftPct}%;width:${widthPct}%" title="${label}"><span class="hblock-label">${label}</span></div>`;
          // Always add a below-label for readability
          belowLabels += `<div class="hblock-below-label" style="left:${leftPct}%;width:${widthPct}%"><span>${timeRange}</span><span class="hblock-below-dur">${formatDuration(durationMs)}</span></div>`;
        }

        html += `
          <div class="timeline-day-group">
            <div class="timeline-day-label">${dayLabel}</div>
            <div class="timeline-day-track">
              <div class="timeline-day-ticks">${ticksHtml}</div>
              <div class="timeline-day-axis">${blocksHtml}</div>
              <div class="timeline-day-labels">${belowLabels}</div>
            </div>
          </div>`;
      }

      html += `<div class="timeline-summary"><span>Total</span><span class="timeline-total-value">${formatDuration(totalMs)}</span></div>`;
      html += '</div>';
      timelineContainer.innerHTML = html;
    }

    // ── Daily Timeline: vertical hour axis with colored blocks ──

    function renderDailyTimeline(bouts) {
      if (!bouts.length) {
        timelineContainer.innerHTML = '<div class="timeline-empty"><p>No sessions recorded</p></div>';
        return;
      }

      const HOUR_HEIGHT = 60; // px per hour
      const colors = ['#6366f1', '#8b5cf6', '#a78bfa', '#6d28d9', '#4f46e5'];

      // Compute axis range
      const starts = bouts.map(b => b.startMs);
      const ends = bouts.map(b => b.endMs || Date.now());
      const minMs = Math.min(...starts);
      const maxMs = Math.max(...ends);

      const startDate = new Date(minMs);
      startDate.setMinutes(0, 0, 0);
      const axisStartMs = startDate.getTime();
      const startHour = startDate.getHours();

      const endDate = new Date(maxMs);
      endDate.setMinutes(0, 0, 0);
      endDate.setHours(endDate.getHours() + 1);
      const axisEndMs = endDate.getTime();
      const endHour = endDate.getHours() || 24;

      const totalHours = Math.ceil((axisEndMs - axisStartMs) / 3600000);
      const axisHeight = totalHours * HOUR_HEIGHT;
      const axisSpan = axisEndMs - axisStartMs;

      // Hour lines
      let hoursHtml = '';
      for (let i = 0; i <= totalHours; i++) {
        const h = (startHour + i) % 24;
        const ampm = h >= 12 ? 'PM' : 'AM';
        const h12 = h % 12 || 12;
        const top = i * HOUR_HEIGHT;
        hoursHtml += `<div class="timeline-hour-line" style="top:${top}px"><span>${h12} ${ampm}</span></div>`;
      }

      // Now marker
      const now = Date.now();
      let nowHtml = '';
      if (now >= axisStartMs && now <= axisEndMs) {
        const nowTop = ((now - axisStartMs) / axisSpan) * axisHeight;
        nowHtml = `<div class="timeline-now-marker" style="top:${nowTop}px"><span>now</span></div>`;
      }

      // Bout blocks
      let totalMs = 0;
      let blocksHtml = '';
      for (const bout of bouts) {
        const endMs = bout.endMs || Date.now();
        const durationMs = endMs - bout.startMs;
        totalMs += durationMs;

        const top = ((bout.startMs - axisStartMs) / axisSpan) * axisHeight;
        const rawHeight = (durationMs / axisSpan) * axisHeight;
        const height = Math.max(rawHeight, 4); // min 4px so it's visible
        const color = colors[bout.colorIndex % colors.length];
        const activeClass = bout.endMs === null ? ' active' : '';
        const label = `${bout.taskTitle} · ${formatDuration(durationMs)}`;
        const timeLabel = `${formatTimeShort(bout.startMs)}–${bout.endMs === null ? 'now' : formatTimeShort(bout.endMs)}`;
        const isShort = height < 28;

        if (isShort) {
          // Short block: narrow block + side label
          blocksHtml += `<div class="timeline-vblock short${activeClass}" style="top:${top}px;height:${height}px;background:${color}" title="${timeLabel} · ${formatDuration(durationMs)}"></div><div class="vblock-side-label" style="top:${top}px;color:${color}">${label} <span class="vblock-side-time">${timeLabel}</span></div>`;
        } else {
          // Tall block: full width with label inside
          blocksHtml += `<div class="timeline-vblock${activeClass}" style="top:${top}px;height:${height}px;background:${color}" title="${timeLabel} · ${formatDuration(durationMs)}"><span class="vblock-label">${label}</span><span class="vblock-time">${timeLabel}</span></div>`;
        }
      }

      let html = `
        <div class="timeline-daily-view">
          <div class="timeline-vaxis" style="height:${axisHeight}px">
            ${hoursHtml}
            ${blocksHtml}
            ${nowHtml}
          </div>
          <div class="timeline-summary"><span>Total</span><span class="timeline-total-value">${formatDuration(totalMs)}</span></div>
        </div>`;

      timelineContainer.innerHTML = html;
    }

    loadContent();
  })();
  </script>
</body>
</html>
