<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="app.css">
  <title>Daily Focus</title>
</head>
<body class="mode-full">

  <!-- ── Full Mode ── -->
  <div class="full-mode-container">
    <div class="container">
      <header class="header" id="header-drag-handle">
        <div class="header-left">
          <svg class="header-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="8" stroke="#6366f1" stroke-width="1.5" fill="none"/>
            <path d="M6 10l3 3 5-6" stroke="#6366f1" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <h1>Daily Focus</h1>
        </div>
        <div class="header-right">
          <span class="header-date" id="header-date"></span>
          <button id="daily-notes-btn" class="mode-toggle-btn" title="Today's notes">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M4.5 1.5h5l3.5 3.5v8.5a1.5 1.5 0 01-1.5 1.5h-7A1.5 1.5 0 013 13.5V3a1.5 1.5 0 011.5-1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" fill="none"/>
              <path d="M9.5 1.5V5.5h4" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
              <path d="M6 8.5h4M6 10.5h3" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
            </svg>
          </button>
          <button id="all-pages-btn" class="mode-toggle-btn" title="All pages">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="3" y="3.5" width="9" height="11" rx="1.2" stroke="currentColor" stroke-width="1.3" fill="none"/>
              <path d="M5 1.5h7.5a1.2 1.2 0 011.2 1.2V11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M5.5 7h4M5.5 9h3" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
            </svg>
          </button>
          <span class="header-total-time" id="header-total-time" title="Total time today">00:00</span>
        </div>
      </header>

      <div class="add-todo">
        <input type="text" id="todo-input" placeholder="What are you working on today?" autocomplete="off">
        <div class="estimate-field">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2" fill="none"/>
            <path d="M6 3v3.5l2 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <input type="text" id="estimate-input" placeholder="0:00" title="Time estimate (h:mm)" autocomplete="off">
        </div>
        <button id="add-btn" title="Add task">+</button>
      </div>

      <div id="todo-list" class="todo-list"></div>

      <div id="empty-state" class="empty-state">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="18" stroke="#e2e8f0" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
          <path d="M18 24l4 4 8-10" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <p>What needs to get done today?</p>
      </div>

      <footer class="footer" id="footer"></footer>
    </div>

    <div id="day-reset-banner" class="day-reset-banner hidden">
      <p>New day! Clear yesterday's tasks?</p>
      <div class="day-reset-actions">
        <button id="reset-clear" class="btn-clear">Clear all</button>
        <button id="reset-keep" class="btn-keep">Keep them</button>
      </div>
    </div>
  </div>

  <!-- ── Compact Mode ── -->
  <div class="compact-mode-container">
    <div class="compact-header" id="compact-drag-handle">
      <div class="compact-grip">
        <span></span><span></span><span></span>
      </div>
      <span class="compact-timer" id="compact-timer"></span>
      <div class="compact-controls">
        <button class="compact-btn" id="compact-page-btn" title="Open page">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M4 1h4l4 4v7a1 1 0 01-1 1H4a1 1 0 01-1-1V2a1 1 0 011-1z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" fill="none"/>
            <path d="M8 1v4h4" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
            <path d="M5.5 8h3M5.5 10h2" stroke="currentColor" stroke-width="0.9" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="compact-btn" id="compact-pause-btn" title="Pause and expand">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="3" y="2" width="3" height="10" rx="0.5" fill="currentColor"/>
            <rect x="8" y="2" width="3" height="10" rx="0.5" fill="currentColor"/>
          </svg>
        </button>
        <button class="compact-btn" id="expand-toggle-btn" title="Switch to full view">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 10L2 12L4 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 4L12 2L10 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="compact-body" id="compact-body">
      <div class="compact-task-row">
        <input type="checkbox" class="compact-check" id="compact-task-check">
        <span class="compact-title" id="compact-task-title">No active task</span>
      </div>
      <div class="compact-progress" id="compact-progress" style="display:none">
        <div class="compact-progress-fill" id="compact-progress-fill"></div>
      </div>
      <div class="compact-subs" id="compact-subtask-list"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
