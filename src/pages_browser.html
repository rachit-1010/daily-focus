<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="pages_browser.css">
  <title>All Pages</title>
</head>
<body>

  <!-- ── List View ── -->
  <div class="list-view" id="list-view">
    <div class="browser-toolbar">
      <div class="browser-title-row">
        <span class="browser-title">All Pages</span>
        <button class="new-note-btn" id="new-note-btn">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          New Note
        </button>
      </div>

      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M9.5 9.5L12.5 12.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <input type="text" class="search-input" id="search-input" placeholder="Search pages..." autocomplete="off">
      </div>

      <div class="filter-tabs" id="filter-tabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="task">Tasks</button>
        <button class="filter-tab" data-filter="daily">Days</button>
        <button class="filter-tab" data-filter="note">Notes</button>
      </div>
    </div>

    <div class="page-list" id="page-list"></div>

    <div class="empty-state" id="empty-state" style="display:none">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <rect x="10" y="8" width="22" height="30" rx="3" stroke="#e2e8f0" stroke-width="2" fill="none"/>
        <path d="M16 18h10M16 23h7" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
        <rect x="16" y="12" width="18" height="26" rx="3" stroke="#e2e8f0" stroke-width="2" fill="none"/>
      </svg>
      <p id="empty-state-text">No pages yet. Create a note to get started.</p>
    </div>
  </div>

  <!-- ── Editor View ── -->
  <div class="editor-view hidden" id="editor-view">
    <div class="editor-toolbar">
      <button class="back-btn" id="back-btn" title="Back to list">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="editor-title-wrap">
        <span class="editor-title-display" id="editor-title-display"></span>
        <input type="text" class="editor-title-input" id="editor-title-input" style="display:none" placeholder="Untitled">
      </div>
      <span class="editor-type-badge" id="editor-type-badge"></span>
    </div>
    <div class="editor-toggle-row">
      <div class="page-view-toggle" id="browser-view-toggle">
        <button class="view-btn active" data-view="notes">Notes</button>
        <button class="view-btn" data-view="timeline">Timeline</button>
      </div>
    </div>
    <div class="editor-format-bar" id="editor-format-bar">
      <button class="fmt-btn" data-cmd="bold" title="Bold"><b>B</b></button>
      <button class="fmt-btn" data-cmd="italic" title="Italic"><i>I</i></button>
      <button class="fmt-btn" data-cmd="strike" title="Strikethrough"><s>S</s></button>
      <button class="fmt-btn" data-cmd="code" title="Inline code"><code>&lt;&gt;</code></button>
      <span class="fmt-sep"></span>
      <button class="fmt-btn" data-cmd="h1" title="Heading 1">H1</button>
      <button class="fmt-btn" data-cmd="h2" title="Heading 2">H2</button>
      <button class="fmt-btn" data-cmd="h3" title="Heading 3">H3</button>
      <span class="fmt-sep"></span>
      <button class="fmt-btn" data-cmd="bulletList" title="Bullet list">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="2.5" cy="3.5" r="1" fill="currentColor"/><circle cx="2.5" cy="7" r="1" fill="currentColor"/><circle cx="2.5" cy="10.5" r="1" fill="currentColor"/><path d="M5.5 3.5h6M5.5 7h6M5.5 10.5h6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
      <button class="fmt-btn" data-cmd="orderedList" title="Ordered list">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><text x="1" y="5" font-size="5.5" fill="currentColor" font-family="inherit">1.</text><text x="1" y="8.5" font-size="5.5" fill="currentColor" font-family="inherit">2.</text><text x="1" y="12" font-size="5.5" fill="currentColor" font-family="inherit">3.</text><path d="M5.5 3.5h6M5.5 7h6M5.5 10.5h6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
      <button class="fmt-btn" data-cmd="blockquote" title="Blockquote">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 3v8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><path d="M6.5 5h5M6.5 7.5h4M6.5 10h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
      <button class="fmt-btn" data-cmd="codeBlock" title="Code block">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M4.5 4L2 7l2.5 3M9.5 4L12 7l-2.5 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="fmt-btn" data-cmd="horizontalRule" title="Horizontal rule">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="editor-wrap">
      <div class="editor-container" id="editor-container"></div>
      <div class="timeline-container" id="browser-timeline-container" style="display:none"></div>
    </div>
    <div class="editor-status" id="editor-status"></div>
  </div>

  <script type="module">
    import { Editor } from 'https://esm.sh/@tiptap/core@2';
    import StarterKit from 'https://esm.sh/@tiptap/starter-kit@2';
    import Placeholder from 'https://esm.sh/@tiptap/extension-placeholder@2';

  (function () {
    'use strict';

    const { invoke } = window.__TAURI__.core;
    const { listen } = window.__TAURI__.event;

    // ── State ──

    let allPages = [];
    let activeFilter = 'all';
    let searchQuery = '';
    let searchTimer = null;
    let currentPageId = null;
    let currentPageMeta = null;
    let saveTimer = null;

    // ── DOM refs ──

    const listView = document.getElementById('list-view');
    const editorView = document.getElementById('editor-view');
    const pageList = document.getElementById('page-list');
    const emptyState = document.getElementById('empty-state');
    const emptyStateText = document.getElementById('empty-state-text');
    const searchInput = document.getElementById('search-input');
    const filterTabs = document.getElementById('filter-tabs');
    const newNoteBtn = document.getElementById('new-note-btn');
    const backBtn = document.getElementById('back-btn');
    const editorTitleDisplay = document.getElementById('editor-title-display');
    const editorTitleInput = document.getElementById('editor-title-input');
    const editorTypeBadge = document.getElementById('editor-type-badge');
    const editorContainer = document.getElementById('editor-container');
    const editorFormatBar = document.getElementById('editor-format-bar');
    const editorStatus = document.getElementById('editor-status');

    // ── Tiptap editor ──

    let editor = null;

    function contentToHtml(raw) {
      if (!raw || raw.trim() === '') return '';
      if (raw.match(/^<[a-z][\s\S]*>/i)) return raw;
      return raw.split('\n').map(line =>
        line.trim() === '' ? '<p></p>' : `<p>${line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>`
      ).join('');
    }

    function initEditor() {
      editor = new Editor({
        element: editorContainer,
        extensions: [
          StarterKit,
          Placeholder.configure({ placeholder: 'Write your notes here...' }),
        ],
        content: '',
        onUpdate: () => scheduleSave(),
        onSelectionUpdate: () => updateToolbarState(),
      });
    }

    function updateToolbarState() {
      if (!editor) return;
      editorFormatBar.querySelectorAll('.fmt-btn').forEach(btn => {
        const cmd = btn.dataset.cmd;
        let active = false;
        if (cmd === 'bold') active = editor.isActive('bold');
        else if (cmd === 'italic') active = editor.isActive('italic');
        else if (cmd === 'strike') active = editor.isActive('strike');
        else if (cmd === 'code') active = editor.isActive('code');
        else if (cmd === 'h1') active = editor.isActive('heading', { level: 1 });
        else if (cmd === 'h2') active = editor.isActive('heading', { level: 2 });
        else if (cmd === 'h3') active = editor.isActive('heading', { level: 3 });
        else if (cmd === 'bulletList') active = editor.isActive('bulletList');
        else if (cmd === 'orderedList') active = editor.isActive('orderedList');
        else if (cmd === 'blockquote') active = editor.isActive('blockquote');
        else if (cmd === 'codeBlock') active = editor.isActive('codeBlock');
        btn.classList.toggle('active', active);
      });
    }

    editorFormatBar.addEventListener('click', (e) => {
      const btn = e.target.closest('.fmt-btn');
      if (!btn || !editor) return;
      const cmd = btn.dataset.cmd;
      const chain = editor.chain().focus();
      if (cmd === 'bold') chain.toggleBold().run();
      else if (cmd === 'italic') chain.toggleItalic().run();
      else if (cmd === 'strike') chain.toggleStrike().run();
      else if (cmd === 'code') chain.toggleCode().run();
      else if (cmd === 'h1') chain.toggleHeading({ level: 1 }).run();
      else if (cmd === 'h2') chain.toggleHeading({ level: 2 }).run();
      else if (cmd === 'h3') chain.toggleHeading({ level: 3 }).run();
      else if (cmd === 'bulletList') chain.toggleBulletList().run();
      else if (cmd === 'orderedList') chain.toggleOrderedList().run();
      else if (cmd === 'blockquote') chain.toggleBlockquote().run();
      else if (cmd === 'codeBlock') chain.toggleCodeBlock().run();
      else if (cmd === 'horizontalRule') chain.setHorizontalRule().run();
    });

    initEditor();

    // ── SVG icons ──

    const taskIconSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M5.5 8l2 2 3.5-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    const dailyIconSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2.5" y="3" width="11" height="10.5" rx="1.5" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M2.5 6.5h11" stroke="currentColor" stroke-width="1.3"/><path d="M5.5 1.5v3M10.5 1.5v3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>';
    const noteIconSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4.5 1.5h5l3.5 3.5v8.5a1.5 1.5 0 01-1.5 1.5h-7A1.5 1.5 0 013 13.5V3a1.5 1.5 0 011.5-1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" fill="none"/><path d="M9.5 1.5V5.5h4" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>';
    const chevronSvg = '<svg width="10" height="10" viewBox="0 0 10 10"><path d="M3 1l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>';
    const deleteSvg = '<svg width="14" height="14" viewBox="0 0 14 14"><path d="M4 4l6 6M10 4l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';

    // ── Helpers ──

    function getIconForType(type) {
      if (type === 'task') return taskIconSvg;
      if (type === 'daily') return dailyIconSvg;
      return noteIconSvg;
    }

    function getBadgeLabel(type) {
      if (type === 'task') return 'Task';
      if (type === 'daily') return 'Day';
      return 'Note';
    }

    function formatRelativeDate(ms) {
      const now = Date.now();
      const diff = now - ms;
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);

      if (minutes < 1) return 'Just now';
      if (minutes < 60) return `${minutes}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days < 7) return `${days}d ago`;
      const d = new Date(ms);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // ── Load pages ──

    async function loadPages() {
      try {
        allPages = await invoke('list_all_pages');
      } catch (e) {
        console.error('Failed to load pages:', e);
        allPages = [];
      }
      renderList();
    }

    // ── Filter & search ──

    function getFilteredPages() {
      let pages = allPages;

      // Apply type filter
      if (activeFilter !== 'all') {
        pages = pages.filter(p => p.pageType === activeFilter);
      }

      // Apply search (title only for instant results)
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        pages = pages.filter(p => p.title.toLowerCase().includes(q));
      }

      return pages;
    }

    // ── Render list ──

    function renderList() {
      const pages = getFilteredPages();
      pageList.innerHTML = '';

      if (pages.length === 0) {
        emptyState.style.display = '';
        if (searchQuery) {
          emptyStateText.textContent = `No pages matching "${searchQuery}"`;
        } else if (activeFilter !== 'all') {
          const labels = { task: 'task', daily: 'day', note: 'note' };
          emptyStateText.textContent = `No ${labels[activeFilter]} pages found.`;
        } else {
          emptyStateText.textContent = 'No pages yet. Create a note to get started.';
        }
        return;
      }

      emptyState.style.display = 'none';

      pages.forEach(page => {
        const row = document.createElement('div');
        row.className = 'page-row';

        // Icon
        const icon = document.createElement('div');
        icon.className = `page-row-icon type-${page.pageType}`;
        icon.innerHTML = getIconForType(page.pageType);

        // Content
        const content = document.createElement('div');
        content.className = 'page-row-content';

        const title = document.createElement('div');
        title.className = 'page-row-title';
        title.textContent = page.title;

        const meta = document.createElement('div');
        meta.className = 'page-row-meta';

        const badge = document.createElement('span');
        badge.className = `page-type-badge type-${page.pageType}`;
        badge.textContent = getBadgeLabel(page.pageType);

        const date = document.createElement('span');
        date.className = 'page-row-date';
        date.textContent = formatRelativeDate(page.updatedAt);

        meta.appendChild(badge);
        meta.appendChild(date);
        content.appendChild(title);
        content.appendChild(meta);

        // Chevron
        const chevron = document.createElement('div');
        chevron.className = 'page-row-chevron';
        chevron.innerHTML = chevronSvg;

        // Delete button (for note pages only, or all pages)
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'page-row-delete';
        deleteBtn.innerHTML = deleteSvg;
        deleteBtn.title = 'Delete page';
        deleteBtn.addEventListener('click', async (e) => {
          e.stopPropagation();
          await invoke('delete_page', { taskId: page.id });
          await loadPages();
        });

        row.appendChild(icon);
        row.appendChild(content);
        row.appendChild(chevron);
        row.appendChild(deleteBtn);

        row.addEventListener('click', () => openPage(page));
        pageList.appendChild(row);
      });
    }

    // ── Search handler ──

    searchInput.addEventListener('input', () => {
      searchQuery = searchInput.value.trim();

      // Instant title-based filtering
      renderList();

      // Debounced content search
      clearTimeout(searchTimer);
      if (searchQuery.length >= 2) {
        searchTimer = setTimeout(async () => {
          try {
            const results = await invoke('search_pages', { query: searchQuery });
            // Merge: keep allPages but reorder to put search results first
            const resultIds = new Set(results.map(r => r.id));
            const searchFiltered = results.concat(
              allPages.filter(p => !resultIds.has(p.id))
            );
            // Only replace the rendered list with search-aware ordering
            const q = searchQuery.toLowerCase();
            const pages = searchFiltered.filter(p => {
              if (activeFilter !== 'all' && p.pageType !== activeFilter) return false;
              return resultIds.has(p.id);
            });

            pageList.innerHTML = '';
            if (pages.length === 0) {
              emptyState.style.display = '';
              emptyStateText.textContent = `No pages matching "${searchQuery}"`;
              return;
            }
            emptyState.style.display = 'none';
            pages.forEach(page => {
              const row = createPageRow(page);
              pageList.appendChild(row);
            });
          } catch (e) {
            console.error('Search failed:', e);
          }
        }, 300);
      }
    });

    function createPageRow(page) {
      const row = document.createElement('div');
      row.className = 'page-row';

      const icon = document.createElement('div');
      icon.className = `page-row-icon type-${page.pageType}`;
      icon.innerHTML = getIconForType(page.pageType);

      const content = document.createElement('div');
      content.className = 'page-row-content';

      const title = document.createElement('div');
      title.className = 'page-row-title';
      title.textContent = page.title;

      const meta = document.createElement('div');
      meta.className = 'page-row-meta';

      const badge = document.createElement('span');
      badge.className = `page-type-badge type-${page.pageType}`;
      badge.textContent = getBadgeLabel(page.pageType);

      const date = document.createElement('span');
      date.className = 'page-row-date';
      date.textContent = formatRelativeDate(page.updatedAt);

      meta.appendChild(badge);
      meta.appendChild(date);
      content.appendChild(title);
      content.appendChild(meta);

      const chevron = document.createElement('div');
      chevron.className = 'page-row-chevron';
      chevron.innerHTML = chevronSvg;

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'page-row-delete';
      deleteBtn.innerHTML = deleteSvg;
      deleteBtn.title = 'Delete page';
      deleteBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        await invoke('delete_page', { taskId: page.id });
        await loadPages();
      });

      row.appendChild(icon);
      row.appendChild(content);
      row.appendChild(chevron);
      row.appendChild(deleteBtn);

      row.addEventListener('click', () => openPage(page));
      return row;
    }

    // ── Filter tabs ──

    filterTabs.addEventListener('click', (e) => {
      const tab = e.target.closest('.filter-tab');
      if (!tab) return;
      activeFilter = tab.dataset.filter;
      filterTabs.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderList();
    });

    // ── New note ──

    newNoteBtn.addEventListener('click', async () => {
      try {
        const meta = await invoke('create_note_page');
        await loadPages();
        openPage(meta);
      } catch (e) {
        console.error('Failed to create note:', e);
      }
    });

    // ── Open page ──

    async function openPage(pageMeta, openPageOptions) {
      currentPageId = pageMeta.id;
      currentPageMeta = pageMeta;

      // Load content
      let content = '';
      try {
        content = await invoke('load_page', { taskId: pageMeta.id });
      } catch (e) {
        console.error('Failed to load page:', e);
      }

      // Setup editor
      editor.commands.setContent(contentToHtml(content));

      // Title
      if (pageMeta.pageType === 'note') {
        editorTitleDisplay.style.display = 'none';
        editorTitleInput.style.display = '';
        editorTitleInput.value = pageMeta.title;
      } else {
        editorTitleDisplay.style.display = '';
        editorTitleInput.style.display = 'none';
        editorTitleDisplay.textContent = pageMeta.title;
      }

      // Type badge
      editorTypeBadge.textContent = getBadgeLabel(pageMeta.pageType);
      editorTypeBadge.className = `editor-type-badge page-type-badge type-${pageMeta.pageType}`;

      // Set initial view (notes or timeline)
      const initialView = openPageOptions?.view || 'notes';
      browserCurrentView = initialView;
      browserViewToggle.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      browserViewToggle.querySelector(`[data-view="${initialView}"]`).classList.add('active');
      if (initialView === 'timeline') {
        editorContainer.style.display = 'none';
        editorFormatBar.style.display = 'none';
        browserTimelineContainer.style.display = '';
        loadBrowserTimeline();
      } else {
        editorContainer.style.display = '';
        editorFormatBar.style.display = '';
        browserTimelineContainer.style.display = 'none';
        stopBrowserTimelinePoll();
      }

      // Switch views
      listView.classList.add('hidden');
      editorView.classList.remove('hidden');
      if (initialView !== 'timeline') editor.commands.focus();
      editorStatus.textContent = '';
    }

    // ── Back button ──

    backBtn.addEventListener('click', async () => {
      await saveCurrentPage();
      currentPageId = null;
      currentPageMeta = null;

      editorView.classList.add('hidden');
      listView.classList.remove('hidden');

      // Refresh list
      await loadPages();
    });

    // ── Auto-save with debounce ──

    function scheduleSave() {
      clearTimeout(saveTimer);
      editorStatus.textContent = '';
      saveTimer = setTimeout(async () => {
        await saveCurrentPage();
        editorStatus.textContent = 'Saved';
        setTimeout(() => { editorStatus.textContent = ''; }, 1500);
      }, 400);
    }

    async function saveCurrentPage() {
      if (!currentPageId || !editor) return;
      try {
        await invoke('save_page', { taskId: currentPageId, content: editor.getHTML() });
      } catch (e) {
        console.error('Failed to save page:', e);
      }
    }

    // ── Title rename for notes ──

    editorTitleInput.addEventListener('blur', async () => {
      if (!currentPageMeta || currentPageMeta.pageType !== 'note') return;
      const newTitle = editorTitleInput.value.trim() || 'Untitled';
      if (newTitle !== currentPageMeta.title) {
        currentPageMeta.title = newTitle;
        try {
          await invoke('rename_page', { pageId: currentPageId, title: newTitle });
        } catch (e) {
          console.error('Failed to rename page:', e);
        }
      }
    });

    editorTitleInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        if (editor) editor.commands.focus();
      }
    });

    // ── Save before close ──

    window.addEventListener('beforeunload', () => {
      clearTimeout(saveTimer);
      if (currentPageId && editor) {
        invoke('save_page', { taskId: currentPageId, content: editor.getHTML() });
      }
      stopBrowserTimelinePoll();
    });

    // ── Timeline in browser editor ──

    const browserViewToggle = document.getElementById('browser-view-toggle');
    const browserTimelineContainer = document.getElementById('browser-timeline-container');
    let browserCurrentView = 'notes';
    let browserTimelinePollInterval = null;

    function formatTimeShort(ms) {
      const d = new Date(ms);
      let h = d.getHours();
      const m = d.getMinutes();
      const ampm = h >= 12 ? 'p' : 'a';
      h = h % 12 || 12;
      return m === 0 ? `${h}${ampm}` : `${h}:${String(m).padStart(2, '0')}${ampm}`;
    }

    function formatDuration(ms) {
      const totalMin = Math.floor(ms / 60000);
      if (totalMin < 60) return `${totalMin}m`;
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;
      return m > 0 ? `${h}h ${m}m` : `${h}h`;
    }

    function formatDayLabel(ms) {
      const d = new Date(ms);
      return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    }

    browserViewToggle.addEventListener('click', (e) => {
      const btn = e.target.closest('.view-btn');
      if (!btn || btn.dataset.view === browserCurrentView) return;

      browserCurrentView = btn.dataset.view;
      browserViewToggle.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      if (browserCurrentView === 'timeline') {
        editorContainer.style.display = 'none';
        editorFormatBar.style.display = 'none';
        browserTimelineContainer.style.display = '';
        loadBrowserTimeline();
      } else {
        editorContainer.style.display = '';
        editorFormatBar.style.display = '';
        browserTimelineContainer.style.display = 'none';
        stopBrowserTimelinePoll();
      }
    });

    function stopBrowserTimelinePoll() {
      if (browserTimelinePollInterval) {
        clearInterval(browserTimelinePollInterval);
        browserTimelinePollInterval = null;
      }
    }

    async function loadBrowserTimeline() {
      if (!currentPageId) return;
      try {
        const bouts = await invoke('load_timeline', { taskId: currentPageId });
        const isDaily = currentPageId.startsWith('daily_');
        if (isDaily) {
          renderBrowserDailyTimeline(bouts);
        } else {
          renderBrowserTaskTimeline(bouts);
        }
        stopBrowserTimelinePoll();
        if (bouts.some(b => b.endMs === null)) {
          browserTimelinePollInterval = setInterval(loadBrowserTimeline, 10000);
        }
      } catch (e) {
        console.error('Failed to load timeline:', e);
        browserTimelineContainer.innerHTML = '<div class="timeline-empty">Failed to load timeline</div>';
      }
    }

    function renderBrowserTaskTimeline(bouts) {
      if (!bouts.length) {
        browserTimelineContainer.innerHTML = '<div class="timeline-empty"><p>No sessions recorded</p></div>';
        return;
      }

      const dayGroups = new Map();
      for (const bout of bouts) {
        const dayKey = new Date(bout.startMs).toLocaleDateString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit' });
        if (!dayGroups.has(dayKey)) dayGroups.set(dayKey, []);
        dayGroups.get(dayKey).push(bout);
      }

      let totalMs = 0;
      let html = '<div class="timeline-task-view">';

      const PX_PER_HOUR = 80;

      for (const [dayKey, dayBouts] of dayGroups) {
        const dayLabel = formatDayLabel(dayBouts[0].startMs);
        const starts = dayBouts.map(b => b.startMs);
        const ends = dayBouts.map(b => b.endMs || Date.now());
        const minMs = Math.min(...starts);
        const maxMs = Math.max(...ends);

        const minDate = new Date(minMs);
        minDate.setMinutes(0, 0, 0);
        const axisStart = minDate.getTime();

        const maxDate = new Date(maxMs);
        maxDate.setMinutes(0, 0, 0);
        maxDate.setHours(maxDate.getHours() + 1);
        const axisEnd = maxDate.getTime();
        const axisSpan = axisEnd - axisStart;
        const totalHours = axisSpan / 3600000;
        const axisWidthRaw = totalHours * PX_PER_HOUR;

        // Hour tick labels + gridlines
        let ticksHtml = '';
        let gridHtml = '';
        const tickDate = new Date(axisStart);
        while (tickDate.getTime() <= axisEnd) {
          const leftPx = ((tickDate.getTime() - axisStart) / axisSpan) * axisWidthRaw;
          const label = formatTimeShort(tickDate.getTime());
          ticksHtml += `<div class="timeline-hour-tick" style="left:${leftPx}px"><span>${label}</span></div>`;
          gridHtml += `<div class="timeline-gridline" style="left:${leftPx}px"></div>`;
          // 30-min minor tick
          const halfMs = tickDate.getTime() + 1800000;
          if (halfMs < axisEnd) {
            const halfPx = ((halfMs - axisStart) / axisSpan) * axisWidthRaw;
            gridHtml += `<div class="timeline-gridline minor" style="left:${halfPx}px"></div>`;
          }
          tickDate.setHours(tickDate.getHours() + 1);
        }

        let blocksHtml = '';
        for (const bout of dayBouts) {
          const endMs = bout.endMs || Date.now();
          const durationMs = endMs - bout.startMs;
          totalMs += durationMs;

          const leftPx = ((bout.startMs - axisStart) / axisSpan) * axisWidthRaw;
          const widthPx = Math.max((durationMs / axisSpan) * axisWidthRaw, 6);
          const activeClass = bout.endMs === null ? ' active' : '';
          const timeRange = `${formatTimeShort(bout.startMs)}–${bout.endMs === null ? 'now' : formatTimeShort(bout.endMs)}`;
          const tooltip = `${timeRange} · ${formatDuration(durationMs)}`;

          blocksHtml += `<div class="timeline-hblock${activeClass}" style="left:${leftPx}px;width:${widthPx}px"><span class="hblock-tooltip"><span class="hblock-tooltip-time">${timeRange}</span><span class="hblock-tooltip-dur">${formatDuration(durationMs)}</span></span></div>`;
        }

        html += `
          <div class="timeline-day-group">
            <div class="timeline-day-label">${dayLabel}</div>
            <div class="timeline-day-track">
              <div class="timeline-day-ticks" style="min-width:100%;width:${axisWidthRaw}px">${ticksHtml}</div>
              <div class="timeline-day-axis" style="min-width:100%;width:${axisWidthRaw}px">${gridHtml}${blocksHtml}</div>
            </div>
          </div>`;
      }

      html += `<div class="timeline-summary"><span>Total</span><span class="timeline-total-value">${formatDuration(totalMs)}</span></div>`;
      html += '</div>';
      browserTimelineContainer.innerHTML = html;

      // Position tooltips left/right based on available space
      browserTimelineContainer.querySelectorAll('.timeline-hblock').forEach(block => {
        const tooltip = block.querySelector('.hblock-tooltip');
        if (!tooltip) return;

        block.addEventListener('mouseenter', () => {
          const blockRect = block.getBoundingClientRect();
          const tooltipWidth = tooltip.offsetWidth || 120;
          const spaceRight = window.innerWidth - blockRect.right;
          const spaceLeft = blockRect.left;

          tooltip.classList.remove('tooltip-left', 'tooltip-right');

          if (spaceRight >= tooltipWidth + 12) {
            // Show on the right
            tooltip.classList.add('tooltip-right');
            tooltip.style.left = (blockRect.right + 8) + 'px';
          } else {
            // Show on the left
            tooltip.classList.add('tooltip-left');
            tooltip.style.left = (blockRect.left - tooltipWidth - 8) + 'px';
          }
          tooltip.style.top = (blockRect.top + blockRect.height / 2 - tooltip.offsetHeight / 2) + 'px';
        });
      });
    }

    function renderBrowserDailyTimeline(bouts) {
      if (!bouts.length) {
        browserTimelineContainer.innerHTML = '<div class="timeline-empty"><p>No sessions recorded</p></div>';
        return;
      }

      const HOUR_HEIGHT = 60;
      const colors = ['#6366f1', '#8b5cf6', '#a78bfa', '#6d28d9', '#4f46e5'];

      const starts = bouts.map(b => b.startMs);
      const ends = bouts.map(b => b.endMs || Date.now());
      const minMs = Math.min(...starts);
      const maxMs = Math.max(...ends);

      const startDate = new Date(minMs);
      startDate.setMinutes(0, 0, 0);
      const axisStartMs = startDate.getTime();
      const startHour = startDate.getHours();

      const endDate = new Date(maxMs);
      endDate.setMinutes(0, 0, 0);
      endDate.setHours(endDate.getHours() + 1);
      const axisEndMs = endDate.getTime();

      const totalHours = Math.ceil((axisEndMs - axisStartMs) / 3600000);
      const axisHeight = totalHours * HOUR_HEIGHT;
      const axisSpan = axisEndMs - axisStartMs;

      let hoursHtml = '';
      for (let i = 0; i <= totalHours; i++) {
        const h = (startHour + i) % 24;
        const ampm = h >= 12 ? 'PM' : 'AM';
        const h12 = h % 12 || 12;
        const top = i * HOUR_HEIGHT;
        hoursHtml += `<div class="timeline-hour-line" style="top:${top}px"><span>${h12} ${ampm}</span></div>`;
      }

      const now = Date.now();
      let nowHtml = '';
      if (now >= axisStartMs && now <= axisEndMs) {
        const nowTop = ((now - axisStartMs) / axisSpan) * axisHeight;
        nowHtml = `<div class="timeline-now-marker" style="top:${nowTop}px"><span>now</span></div>`;
      }

      let totalMs = 0;
      let blocksHtml = '';
      for (const bout of bouts) {
        const endMs = bout.endMs || Date.now();
        const durationMs = endMs - bout.startMs;
        totalMs += durationMs;

        const top = ((bout.startMs - axisStartMs) / axisSpan) * axisHeight;
        const rawHeight = (durationMs / axisSpan) * axisHeight;
        const height = Math.max(rawHeight, 4);
        const color = colors[bout.colorIndex % colors.length];
        const activeClass = bout.endMs === null ? ' active' : '';
        const label = `${bout.taskTitle} · ${formatDuration(durationMs)}`;
        const timeLabel = `${formatTimeShort(bout.startMs)}–${bout.endMs === null ? 'now' : formatTimeShort(bout.endMs)}`;
        const isShort = height < 28;

        if (isShort) {
          blocksHtml += `<div class="timeline-vblock short${activeClass}" style="top:${top}px;height:${height}px;background:${color}" title="${timeLabel} · ${formatDuration(durationMs)}"></div><div class="vblock-side-label" style="top:${top}px;color:${color}">${label} <span class="vblock-side-time">${timeLabel}</span></div>`;
        } else {
          blocksHtml += `<div class="timeline-vblock${activeClass}" style="top:${top}px;height:${height}px;background:${color}" title="${timeLabel} · ${formatDuration(durationMs)}"><span class="vblock-label">${label}</span><span class="vblock-time">${timeLabel}</span></div>`;
        }
      }

      let html = `
        <div class="timeline-daily-view">
          <div class="timeline-vaxis" style="height:${axisHeight}px">
            ${hoursHtml}
            ${blocksHtml}
            ${nowHtml}
          </div>
          <div class="timeline-summary"><span>Total</span><span class="timeline-total-value">${formatDuration(totalMs)}</span></div>
        </div>`;

      browserTimelineContainer.innerHTML = html;
    }

    // ── Navigate-to-page event (from open_page_window command) ──

    async function resolvePageMeta(taskId) {
      if (taskId.startsWith('daily_')) {
        const dateStr = taskId.substring(6);
        const d = new Date(dateStr + 'T00:00:00');
        const title = d.toLocaleDateString('en-US', {
          weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
        });
        return { id: taskId, title, pageType: 'daily' };
      }
      // Look up in loaded pages first
      const found = allPages.find(p => p.id === taskId);
      if (found) return found;
      // Fallback: load data to find task title
      try {
        const data = await invoke('load_data');
        const allTasks = [...(data.todos || []), ...(data.archivedTodos || [])];
        const task = allTasks.find(t => t.id === taskId);
        if (task) return { id: taskId, title: task.title, pageType: 'task' };
      } catch (e) {
        console.error('Failed to resolve page meta:', e);
      }
      return { id: taskId, title: 'Notes', pageType: 'task' };
    }

    listen('navigate-to-page', async (event) => {
      const payload = event.payload;
      const taskId = typeof payload === 'string' ? payload : payload.taskId;
      const view = typeof payload === 'string' ? null : payload.view;
      const pageMeta = await resolvePageMeta(taskId);
      openPage(pageMeta, view ? { view } : null);
    });

    // ── Init ──

    const urlParams = new URLSearchParams(window.location.search);
    const initialPageId = urlParams.get('page');
    const initialView = urlParams.get('view');

    if (initialPageId) {
      // Hide list view immediately to avoid flash
      listView.classList.add('hidden');
      editorView.classList.remove('hidden');
      // Load pages in background, then navigate to the target page
      loadPages().then(async () => {
        const pageMeta = await resolvePageMeta(initialPageId);
        openPage(pageMeta, initialView ? { view: initialView } : null);
      });
    } else {
      loadPages();
    }
  })();
  </script>
</body>
</html>
